name: Triage Dependency Updates

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  # GitHub blocks ALL workflow runs for dependabot PRs that modify .github/workflows/*.yml
  # (even pull_request_target), so auto-merge stalls waiting for checks that never arrive.
  # Detect github_actions ecosystem bumps early and merge them directly — they only change
  # action version pins, no user code runs, so no CI gate is needed.
  merge-actions-bump:
    name: Auto-merge GitHub Actions version bumps
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge github_actions bumps immediately
        if: steps.metadata.outputs.package-ecosystem == 'github_actions'
        run: gh pr merge --squash --admin "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  triage:
    name: Auto-approve and request Copilot triage
    runs-on: ubuntu-latest
    if: |
      github.actor == 'dependabot[bot]' ||
      github.actor == 'renovate[bot]'

    steps:
      - name: Auto-approve
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Request Copilot as reviewer
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-reviewer "copilot"

      - name: Post Copilot triage instructions
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sep = '---';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '@copilot Please evaluate this dependency update and determine whether a new version of this package should be published.',
                '',
                '**Your job:**',
                '1. Check the updated package\'s changelog for breaking changes, new APIs, or behavioral differences',
                '2. Examine how this package uses the dependency — does it re-export types, rely on specific behaviors, or expose it in its public API?',
                '3. Determine the impact on consumers of **this** package:',
                '   - **Major**: breaking change in behavior or types that consumers depend on',
                '   - **Minor**: new capability now exposed to consumers',
                '   - **Patch**: internal fix that consumers benefit from but don\'t need to adapt to',
                '   - **No changeset**: purely internal — no consumer-visible change',
                '',
                '**If a changeset is warranted**, create `.changeset/<descriptive-slug>.md`:',
                '````markdown',
                sep,
                '"<package-name>": patch|minor|major',
                sep,
                '',
                '<One-line summary of the consumer-visible impact>',
                '````',
                '',
                '**If no changeset is needed**, leave a comment explaining why consumers are unaffected.',
              ].join('\n')
            });
