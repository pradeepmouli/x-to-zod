name: Enforce PR base branch

on:
  pull_request:
    types: [opened, reopened, edited]

permissions:
  pull-requests: write

jobs:
  enforce:
    if: github.event.pull_request.base.ref == 'master' && github.event.pull_request.head.ref != 'develop'
    runs-on: ubuntu-latest
    steps:
      - name: Retarget PR to develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --base develop
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "This repo follows gitflow: feature branches merge into \`develop\`, and \`develop\` is periodically promoted to \`master\`. I've automatically retargeted this PR's base branch from \`master\` to \`develop\`."
