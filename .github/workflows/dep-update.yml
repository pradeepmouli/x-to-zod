name: Dependency Update

on:
  schedule:
    - cron: '0 10 * * *'  # Daily 6am ET / 10am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10.32.0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Update dependencies
        run: pnpm update --latest -r

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet package.json pnpm-lock.yaml packages/*/package.json apps/*/package.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Type check
        if: steps.changes.outputs.changed == 'true'
        run: pnpm run type-check
        continue-on-error: true
        id: typecheck

      - name: Build
        if: steps.changes.outputs.changed == 'true' && steps.typecheck.outcome == 'success'
        run: pnpm run build
        continue-on-error: true
        id: build

      - name: Create PR
        if: steps.changes.outputs.changed == 'true' && steps.typecheck.outcome == 'success' && steps.build.outcome == 'success'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): update dependencies to latest'
          title: 'chore(deps): update dependencies to latest'
          body: |
            Automated weekly dependency update via `pnpm update --latest -r`.

            - Type-check: ✅ passed (tsgo --noEmit)
            - Build: ✅ passed

            Auto-generated by the Dependency Update workflow.
          branch: chore/deps-update
          delete-branch: true
          labels: dependencies

      - name: Report failure
        if: steps.changes.outputs.changed == 'true' && (steps.typecheck.outcome == 'failure' || steps.build.outcome == 'failure')
        run: |
          echo "::warning::Dependency update failed verification"
          echo "Type-check: ${{ steps.typecheck.outcome }}"
          echo "Build: ${{ steps.build.outcome }}"
